:root {
  --primary: #116782;
  --primary-dark: #0d5269;
  --accent: #5eff00;
  --cyan: #00c9f5;
  --teal: #118484;
  --white: #ffffff;
  --light-bg: #f0f7f9;
  --text-dark: #1a3a44;
  --border: #d1e8ee;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'AeroMatics', 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #0d5269 0%, #116782 50%, #118484 100%);
  min-height: 100vh;
  color: var(--text-dark);
}
.wrap { max-width: 780px; margin: 0 auto; padding: 30px 20px 60px; }
.header { text-align: center; padding: 20px 0 30px; color: white; }
.header img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); object-fit: cover; }
.header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
.header p { font-size: 0.95rem; opacity: 0.85; max-width: 500px; margin: 0 auto; line-height: 1.5; }
.progress-wrap { margin: 24px 0 8px; }
.progress-bar-bg { background: rgba(255,255,255,0.15); border-radius: 50px; height: 6px; overflow: hidden; }
.progress-bar-fill { background: var(--accent); height: 100%; border-radius: 50px; transition: width 0.4s ease; width: 0%; }
.progress-label { color: rgba(255,255,255,0.7); font-size: 0.8rem; text-align: right; margin-top: 5px; }
.card { background: white; border-radius: 16px; padding: 32px; margin-bottom: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--light-bg); }
.section-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.section-title { font-size: 1.15rem; font-weight: 700; color: var(--primary); }
.section-subtitle { font-size: 0.82rem; color: #666; margin-top: 2px; }
.question { margin-bottom: 28px; }
.question:last-child { margin-bottom: 0; }
.q-text { font-size: 0.95rem; font-weight: 600; color: var(--text-dark); margin-bottom: 12px; line-height: 1.4; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.88rem; color: #444; }
.option:hover { border-color: var(--primary); background: #f0f7f9; }
.option.selected { border-color: var(--primary); background: #e8f4f8; color: var(--primary); font-weight: 600; }
.option input[type=radio] { accent-color: var(--primary); width: 16px; height: 16px; flex-shrink: 0; }
.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
.btn { padding: 12px 28px; border-radius: 8px; font-family: 'AeroMatics', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-secondary { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-secondary:hover { background: #f0f7f9; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 0.82rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select {
  padding: 11px 14px; border: 2px solid var(--border); border-radius: 8px;
  font-family: 'AeroMatics', sans-serif; font-size: 0.9rem; color: var(--text-dark);
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }
.form-group input.error, .form-group select.error { border-color: #e53935; }
.form-intro { margin-bottom: 24px; }
.form-intro h2 { font-size: 1.3rem; color: var(--primary); margin-bottom: 8px; }
.form-intro p { font-size: 0.9rem; color: #555; line-height: 1.5; }
.privacy { font-size: 0.78rem; color: #888; margin-top: 12px; text-align: center; }
.score-circle { width: 130px; height: 130px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; border: 6px solid; }
.score-circle .num { font-size: 2.4rem; font-weight: 700; line-height: 1; }
.score-circle .lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
.risk-label { text-align: center; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
.risk-freq { text-align: center; font-size: 0.88rem; color: #555; margin-bottom: 24px; }
.section-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
@media (max-width: 500px) { .section-scores { grid-template-columns: 1fr; } }
.score-bar-item { background: var(--light-bg); border-radius: 10px; padding: 12px 14px; }
.score-bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
.score-bar-bg { background: #ddd; border-radius: 50px; height: 6px; overflow: hidden; }
.score-bar-inner { height: 100%; border-radius: 50px; }
.next-steps { background: #f0f7f9; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
.next-steps h4 { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.next-steps ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.next-steps li { font-size: 0.87rem; color: #444; display: flex; gap: 8px; }
.next-steps li::before { content: '\2713'; color: var(--primary); font-weight: 700; flex-shrink: 0; }
.cta-box { background: var(--primary); color: white; border-radius: 12px; padding: 24px; text-align: center; }
.cta-box h3 { font-size: 1.1rem; margin-bottom: 8px; }
.cta-box p { font-size: 0.88rem; opacity: 0.85; margin-bottom: 16px; line-height: 1.5; }
.cta-box a { display: inline-block; background: var(--accent); color: var(--text-dark); padding: 12px 28px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 0.95rem; }
.result-header { text-align: center; margin-bottom: 24px; }
.result-header h2 { font-size: 1.4rem; color: var(--primary); margin-bottom: 4px; }
.result-header p { font-size: 0.88rem; color: #666; }
.btn-download { background: var(--accent); color: var(--text-dark); width: 100%; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; border: none; font-family: 'AeroMatics', sans-serif; margin-top: 16px; transition: opacity 0.2s; }
.btn-download:hover { opacity: 0.85; }
.btn-email-sent { background: #e8f4f8; color: var(--primary); width: 100%; padding: 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; border: 2px solid var(--primary); margin-top: 12px; text-align: center; }
.hidden { display: none; }
/* BOOKING MODAL */
.booking-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.booking-modal { background: white; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.booking-modal-header { background: var(--primary); color: white; padding: 24px 28px; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; align-items: center; }
.booking-modal-header h3 { font-size: 1.15rem; font-weight: 700; }
.booking-close { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0 4px; line-height: 1; opacity: 0.8; }
.booking-close:hover { opacity: 1; }
.booking-body { padding: 28px; }
.booking-body p { font-size: 0.9rem; color: #555; line-height: 1.5; margin-bottom: 20px; }
.cal-month { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.cal-month button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--primary); padding: 4px 8px; }
.cal-month span { font-weight: 700; color: var(--text-dark); font-size: 0.95rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-bottom: 20px; }
.cal-grid .cal-dow { font-size: 0.72rem; font-weight: 700; color: #999; text-transform: uppercase; padding: 4px 0; }
.cal-grid .cal-day { font-size: 0.85rem; padding: 8px 4px; border-radius: 8px; cursor: pointer; color: var(--text-dark); transition: all 0.15s; }
.cal-grid .cal-day:hover { background: var(--light-bg); }
.cal-grid .cal-day.disabled { color: #ccc; cursor: default; }
.cal-grid .cal-day.disabled:hover { background: none; }
.cal-grid .cal-day.selected { background: var(--primary); color: white; font-weight: 700; }
.cal-grid .cal-day.today { border: 2px solid var(--primary); }
.time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.time-slot { padding: 10px; border: 2px solid var(--border); border-radius: 8px; text-align: center; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; color: #444; }
.time-slot:hover { border-color: var(--primary); background: var(--light-bg); }
.time-slot.selected { border-color: var(--primary); background: var(--primary); color: white; font-weight: 600; }
.booking-confirm { width: 100%; padding: 14px; background: var(--accent); color: var(--text-dark); border: none; border-radius: 8px; font-family: 'AeroMatics', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.booking-confirm:hover { opacity: 0.85; }
.booking-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
.booking-success { text-align: center; padding: 40px 20px; }
.booking-success .checkmark { width: 64px; height: 64px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; }
.booking-success h3 { font-size: 1.2rem; color: var(--primary); margin-bottom: 8px; }
.booking-success p { font-size: 0.9rem; color: #555; line-height: 1.5; }
.booking-success .detail { background: var(--light-bg); border-radius: 10px; padding: 16px; margin: 16px 0; font-size: 0.88rem; color: var(--text-dark); }
</style>
</head>

function totalQuestions() { return SECTIONS.reduce((a, s) => a + s.questions.length, 0); }
function answeredCount() { return Object.keys(answers).length; }

function getRiskTier(score) {
  if (score <= 25) return {
    label: 'Low Risk \u2014 Maintenance Mode', color: '#4caf50',
    freq: 'Recommended: Annual Cleaning',
    detail: 'Your facility demonstrates strong compliance practices. Continue your current maintenance routine to stay ahead of inspections.',
    steps: ['Maintain your current cleaning schedule', 'Document all maintenance activities', 'Schedule annual professional assessment to stay compliant']
  };
  if (score <= 50) return {
    label: 'Moderate Risk \u2014 Attention Needed', color: '#f59e0b',
    freq: 'Recommended: Bi-Annual Cleaning (Every 6 Months)',
    detail: 'Some areas need attention before your next inspection. Addressing these issues now will prevent them from escalating into violations.',
    steps: ['Schedule professional cleaning within 60 days', 'Establish a bi-annual maintenance calendar', 'Inspect ceiling tiles for staining or damage', 'Verify hood cleaning documentation is current']
  };
  if (score <= 75) return {
    label: 'High Risk \u2014 Action Required', color: '#f97316',
    freq: 'Recommended: Tri-Annual Cleaning (Every 4 Months)',
    detail: 'Multiple areas of concern could trigger health code violations or insurance issues. Professional intervention is recommended.',
    steps: ['Contact a cleaning professional immediately', 'Prioritize hood and HVAC cleaning \u2014 highest violation risk', 'Gather and update all maintenance documentation', 'Establish a recurring 4-month maintenance schedule']
  };
  return {
    label: 'Critical Risk \u2014 Immediate Action Required', color: '#e53935',
    freq: 'Recommended: Quarterly Cleaning (Every 3 Months)',
    detail: 'Significant compliance issues across multiple categories. Your facility is at high risk of citation, fine, or temporary closure.',
    steps: ['Schedule emergency inspection and cleaning now', 'Address hood and grease issues \u2014 fire and health code priority', 'Document everything before your next inspection', 'Implement quarterly professional maintenance going forward']
  };
}

function updateProgress() {
  const pct = Math.round((answeredCount() / totalQuestions()) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = answeredCount() + ' of ' + totalQuestions() + ' questions answered';
}

function selectOption(qid, score, el) {
  document.querySelectorAll('[data-q="' + qid + '"] .option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
  answers[qid] = { score };
  updateProgress();
  // Enable next button if all questions in section answered
  const sec = SECTIONS[currentSection];
  const allAnswered = sec.questions.every(q => answers[q.id] !== undefined);
  const nextBtn = document.querySelector('.nav .btn-primary');
  if (nextBtn) nextBtn.disabled = !allAnswered;
}

function navigate(dir) {
  if (dir === 1) {
    const sec = SECTIONS[currentSection];
    if (!sec.questions.every(q => answers[q.id] !== undefined)) return;
    if (currentSection < SECTIONS.length - 1) { currentSection++; renderAssessment(); }
    else { currentStep = 'lead'; renderLead(); }
  } else {

  }
}

function calcScore() {
  var totalWeight = 0, totalPoints = 0;
  var sectionScores = {};
  SECTIONS.forEach(function(sec) {
    var sw = 0, sp = 0;
    sec.questions.forEach(function(q) {
      var a = answers[q.id];
      if (a !== undefined) {
        totalWeight += q.weight; totalPoints += (a.score / 3) * q.weight;
        sw += q.weight; sp += (a.score / 3) * q.weight;
      }
    });
    sectionScores[sec.id] = sw > 0 ? Math.round((sp / sw) * 100) : 0;
  });
  return { overall: totalWeight > 0 ? Math.round((totalPoints / totalWeight) * 100) : 0, sectionScores: sectionScores };
}

function getBarColor(score) {
  if (score <= 25) return '#4caf50';
  if (score <= 50) return '#f59e0b';
  if (score <= 75) return '#f97316';
  return '#e53935';
}

    '<button onclick="changeMonth(-1)">&lsaquo;</button>' +
    '<span>' + monthNames[bookingMonth] + ' ' + bookingYear + '</span>' +
    '<button onclick="changeMonth(1)">&rsaquo;</button>' +
  '</div>';
  html += '<div class="cal-grid">';
  var dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dows.forEach(function(d) { html += '<div class="cal-dow">' + d + '</div>'; });
  for (var i = 0; i < firstDay; i++) { html += '<div></div>'; }
  for (var d = 1; d <= daysInMonth; d++) {
    var thisDate = new Date(bookingYear, bookingMonth, d);
    var isPast = thisDate < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    var isWeekend = thisDate.getDay() === 0 || thisDate.getDay() === 6;
    var isDisabled = isPast || isWeekend;
    var isToday = d === today.getDate() && bookingMonth === today.getMonth() && bookingYear === today.getFullYear();
    var isSelected = bookingDate && d === bookingDate.getDate() && bookingMonth === bookingDate.getMonth() && bookingYear === bookingDate.getFullYear();
    var cls = 'cal-day';
    if (isDisabled) cls += ' disabled';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (!isDisabled) {
      html += '<div class="' + cls + '" onclick="selectDate(' + bookingYear + ',' + bookingMonth + ',' + d + ')">' + d + '</div>';
    } else {
      html += '<div class="' + cls + '">' + d + '</div>';
    }
  }
  html += '</div>';
  document.getElementById('bookingCalendar').innerHTML = html;
}

function changeMonth(dir) {
  bookingMonth += dir;
  if (bookingMonth > 11) { bookingMonth = 0; bookingYear++; }
  if (bookingMonth < 0) { bookingMonth = 11; bookingYear--; }
  renderCalendar();
}

function selectDate(yr, mo, day) {
  bookingDate = new Date(yr, mo, day);
  bookingTime = null;
  renderCalendar();
  // Show time slots
  var slotsDiv = document.getElementById('bookingTimeSlots');
  slotsDiv.style.display = 'block';
  var slots = ['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM'];
  var html = '<p style="font-size:0.85rem;font-weight:700;color:var(--primary);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Available Times</p>';
  html += '<div class="time-slots">';
  slots.forEach(function(t) {
    html += '<div class="time-slot" onclick="selectTime(this,\'' + t + '\')">' + t + '</div>';
  });
  html += '</div>';
  slotsDiv.innerHTML = html;
  updateConfirmBtn();
}

function selectTime(el, time) {
  bookingTime = time;
  document.querySelectorAll('.time-slot').forEach(function(s) { s.classList.remove('selected'); });
  el.classList.add('selected');
  updateConfirmBtn();
}

function updateConfirmBtn() {
  var btn = document.getElementById('bookingConfirmBtn');
  if (btn) btn.disabled = !(bookingDate && bookingTime);
}

function confirmBooking() {
  if (!bookingDate || !bookingTime) return;
  var dateStr = bookingDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  var body = document.getElementById('bookingBody');
  body.innerHTML =
    '<div class="booking-success">' +
      '<div class="checkmark">\u2713</div>' +
      '<h3>Appointment Requested!</h3>' +
      '<p>We\'ve received your walkthrough request. A member of our team will reach out shortly to confirm your appointment.</p>' +
      '<div class="detail">' +
        '<strong>' + userInfo.facility + '</strong><br>' +
        dateStr + ' at ' + bookingTime + '<br>' +
        userInfo.name + ' \u2022 ' + userInfo.email +
      '</div>' +
      '<p style="font-size:0.82rem;color:#888;margin-top:12px">You\'ll receive a confirmation email at ' + userInfo.email + '</p>' +
      '<button class="booking-confirm" onclick="closeBooking()" style="margin-top:16px">Done</button>' +
    '</div>';

  // Send booking to Zapier if configured (same webhook or separate)
  var ZAPIER_WEBHOOK = 'https://hooks.zapier.com/hooks/catch/24960427/uptkgw2/';
  if (ZAPIER_WEBHOOK) {
    fetch(ZAPIER_WEBHOOK, {
      method: 'POST',
      // no content-type header (Zapier catch hook prefers none)
      body: JSON.stringify({
        type: 'booking_request',
        name: userInfo.name, email: userInfo.email, phone: userInfo.phone,
        facility: userInfo.facility,
        booking_date: dateStr,
        booking_time: bookingTime,
        submitted_at: new Date().toISOString()
      })
    }).catch(function() {});
  }
}

// INIT
renderIntro();
updateProgress();
</script>
</body>
</html>
